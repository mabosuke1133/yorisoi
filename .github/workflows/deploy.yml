name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "--- Starting Deploy Script ---"
            # 1. あなたのサーバーの「真実の住所」へ直接移動
            cd /home/ubuntu/environment/yorisoi || { echo "Directory not found"; exit 1; }
            echo "Successfully moved to: $(pwd)"
            
            # 2. Gitの設定と最新化
            git config --global --add safe.directory /home/ubuntu/environment/yorisoi
            git fetch origin
            git reset --hard origin/main
            
            # 3. Ruby環境 (rbenv) のロード
            export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
            if command -v rbenv > /dev/null; then
              eval "$(rbenv init -)"
            fi
            
            # 4. Railsの更新作業
            bundle install
            RAILS_ENV=production bundle exec rails db:migrate
            
            # 5. 再起動
            sudo systemctl restart puma || echo "Puma service not found, skipping restart."