name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. パスを正確に指定（pwdで確認したパスに変えてください）
            cd /home/ubuntu/environment/yorisoi
            
            # 2. 最新コードを取得
            git pull origin main
            
            # 3. bundle の場所をフルパスで指定して実行
            /home/ubuntu/.rbenv/bin/rbenv exec bundle install
            
            # 4. データベース更新もフルパスで
            /home/ubuntu/.rbenv/bin/rbenv exec bundle exec rails db:migrate RAILS_ENV=production
            
            # 5. 管理人に再起動を命令（先にサーバーで登録作業が必要です）
            sudo systemctl restart puma