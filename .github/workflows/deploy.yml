name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. あなたのサーバーの「真実の住所」へ移動
            cd /home/ubuntu/environment/yorisoi
            
            # 2. 安全のためにディレクトリを信頼設定に追加
            git config --global --add safe.directory /home/ubuntu/environment/yorisoi
            
            # 3. 最新コードを取得
            git pull origin main
            
            # 4. rubyの環境（rbenv）をロードしてから実行
            export PATH="$HOME/.rbenv/bin:$PATH"
            eval "$(rbenv init -)"
            
            bundle install
            bundle exec rails db:migrate RAILS_ENV=production
            
            # 5. 再起動（パスワードなし設定が効いているはずです）
            sudo systemctl restart puma