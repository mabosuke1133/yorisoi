name: Rails CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Deploy 
      env:
        PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        USER_NAME: ${{ secrets.REMOTE_USER }}
        HOST_NAME: ${{ secrets.REMOTE_HOST }}
      run: |
        echo "$PRIVATE_KEY" > private_key && chmod 600 private_key
        ssh -o StrictHostKeyChecking=no -i private_key ${USER_NAME}@${HOST_NAME} 'bash -lc "cd yorisoi &&
        git pull origin main &&
        bundle install &&
        bundle exec rails assets:precompile RAILS_ENV=production &&
        bundle exec rails db:migrate RAILS_ENV=production &&
        if [[ -e tmp/pids/puma.pid ]];then sudo kill $(cat tmp/pids/puma.pid); fi &&
        rails s -e production"'